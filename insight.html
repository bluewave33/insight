<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSIGHT + IDEA + BEST ITEM</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 16px 32px rgba(120,90,40,0.12); }

        .gradient-bg { background: #A8895A; }
        .gradient-bg:hover { background: #96784d; }
        .gradient-text {
            color: #7A5C30;
        }

        .badge { backdrop-filter: blur(10px); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slideIn 0.5s ease-out forwards; }

        .glass-effect {
            background: #f5f0e8;
            backdrop-filter: blur(10px);
        }

        .gold-ring:focus {
            border-color: #A8895A !important;
            box-shadow: 0 0 0 2px rgba(168,137,90,0.18) !important;
        }

        .tag-chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500;
            transition: all 0.2s;
        }
        .tag-chip-active { background: #A8895A; color: #fff; }
        .tag-chip-inactive { background: #f7f2eb; color: #7A5C30; border: 1px solid #ddd0bc; }
        .tag-chip-inactive:hover { background: #ede5d8; }
        .tag-del-btn { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; }
        .tag-del-btn:hover { opacity: 1; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            display: flex; align-items: center; justify-content: center;
            z-index: 60; padding: 16px; overflow-y: auto;
        }
    </style>
</head>
<body class="bg-amber-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const sampleNews = [];


        /* ───── NewsCard ───── */
        function NewsCard({ news, index, onClick }) {
            return (
                <div
                    onClick={() => onClick(news)}
                    className="card-hover bg-white rounded-2xl overflow-hidden shadow-lg animate-slide-in cursor-pointer"
                    style={{ animationDelay: `${index * 0.1}s` }}
                >
                    <div className="relative h-48 overflow-hidden">
                        <img src={news.image} alt={news.title} className="w-full h-full object-cover transition-transform duration-500 hover:scale-110" />
                    </div>
                    <div className="p-6">
                        <div className="flex items-center gap-2 mb-3">
                            <span className="text-xs font-bold text-gray-900">{news.company}</span>
                            <span className="text-xs text-gray-500">{news.ticker}</span>
                        </div>
                        <h3 className="text-lg font-bold text-gray-900 mb-3 line-clamp-2 leading-tight hover:text-amber-700 transition-colors">
                            {news.title}
                        </h3>
                        <p className="text-sm text-gray-600 mb-4 line-clamp-2 leading-relaxed">{news.summary}</p>
                        <div className="flex flex-wrap gap-1.5 mb-4">
                            {news.tags.slice(0, 3).map(tag => (
                                <span key={tag} className="px-2 py-1 bg-amber-50 text-amber-800 text-xs font-medium rounded-md border border-amber-200">
                                    #{tag}
                                </span>
                            ))}
                            {news.tags.length > 3 && (
                                <span className="px-2 py-1 bg-gray-100 text-gray-600 text-xs font-medium rounded-md">
                                    +{news.tags.length - 3}
                                </span>
                            )}
                        </div>
                        <div className="flex items-center justify-between pt-4 border-t border-amber-50">
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-1 text-gray-500">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    <span className="text-xs">{news.views}</span>
                                </div>
                                <div className="flex items-center gap-1 text-gray-500">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
                                    </svg>
                                    <span className="text-xs">{news.comments}</span>
                                </div>
                            </div>
                            <div className="text-xs text-gray-400">{news.source} · {news.time}</div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ───── AddNewsModal ───── */
        function AddNewsModal({ onClose, onAdd, allTags }) {
            const [form, setForm] = useState({
                title: '', summary: '', fullContent: '<strong> 주요 내용 </strong>\n   ▷ 내용\n   ▷ 내용',
                company: '', ticker: '', url: '',
                source: '', priceChange: '', isPositive: true,
                image: 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800'
            });
            const [tagInput, setTagInput] = useState('');
            const [tags, setTags] = useState([]);
            const [attachments, setAttachments] = useState([]);

            const addTag = (t) => {
                const v = t.trim().replace(/^#/, '');
                if (v && !tags.includes(v)) setTags(prev => [...prev, v]);
                setTagInput('');
            };
            const removeTag = (t) => setTags(prev => prev.filter(x => x !== t));

            const addAttachment = (file) => {
                const reader = new FileReader();
                reader.onload = ev => setAttachments(prev => [...prev, { name: file.name, data: ev.target.result, type: file.type, size: file.size }]);
                reader.readAsDataURL(file);
            };

            const handleSubmit = () => {
                if (!form.title) return alert('제목은 필수입니다.');
                onAdd({
                    id: Date.now(),
                    ...form,
                    tags,
                    attachments,
                    time: '방금 전',
                    views: 0,
                    comments: 0
                });
                onClose();
            };

            return (
                <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl my-8 overflow-hidden">
                        {/* 헤더 */}
                        <div className="gradient-bg px-6 py-5 flex items-center justify-between">
                            <h2 className="text-white font-bold text-xl">📰 카드 추가</h2>
                            <button onClick={onClose} className="text-white/80 hover:text-white">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        {/* 폼 */}
                        <div className="p-6 overflow-y-auto max-h-[75vh] space-y-4">
                            {/* 제목 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">제목 <span className="text-red-400">*</span></label>
                                <input className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none"
                                    placeholder="뉴스 제목을 입력하세요" value={form.title}
                                    onChange={e => setForm({...form, title: e.target.value})} />
                            </div>

                            {/* 요약 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">키워드</label>
                                <textarea className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none resize-none"
                                    rows={2} placeholder="키워드를 입력하세요" value={form.summary}
                                    onChange={e => setForm({...form, summary: e.target.value})} />
                            </div>
                            {/* 본문 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">본문</label>
                                <textarea className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none resize-none"
                                    rows={6} placeholder="본문을 입력하세요" value={form.fullContent}
                                    onChange={e => setForm({...form, fullContent: e.target.value})} />
                            </div>
                            {/* 이미지 업로드 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">이미지</label>
                                <div
                                    onDragOver={e => { e.preventDefault(); e.currentTarget.setAttribute('data-drag','true'); }}
                                    onDragLeave={e => e.currentTarget.removeAttribute('data-drag')}
                                    onDrop={e => {
                                        e.preventDefault();
                                        e.currentTarget.removeAttribute('data-drag');
                                        const file = e.dataTransfer.files[0];
                                        if (file && file.type.startsWith('image/')) {
                                            const reader = new FileReader();
                                            reader.onload = ev => setForm(f => ({...f, image: ev.target.result}));
                                            reader.readAsDataURL(file);
                                        }
                                    }}
                                    onPaste={e => {
                                        const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
                                        if (item) {
                                            e.preventDefault();
                                            const reader = new FileReader();
                                            reader.onload = ev => setForm(f => ({...f, image: ev.target.result}));
                                            reader.readAsDataURL(item.getAsFile());
                                        }
                                    }}
                                    onClick={() => document.getElementById('imgFileInput').click()}
                                    className="relative border-2 border-dashed border-amber-200 rounded-xl overflow-hidden cursor-pointer transition-all hover:border-amber-400"
                                    style={{minHeight: '120px'}}
                                >
                                    <input id="imgFileInput" type="file" accept="image/*" className="hidden"
                                        onChange={e => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const reader = new FileReader();
                                                reader.onload = ev => setForm(f => ({...f, image: ev.target.result}));
                                                reader.readAsDataURL(file);
                                            }
                                        }} />
                                    {form.image ? (
                                        <div className="relative">
                                            <img src={form.image} alt="preview" className="w-full h-32 object-cover" />
                                            <button
                                                onClick={e => { e.stopPropagation(); setForm(f => ({...f, image: ''})); }}
                                                className="absolute top-2 right-2 bg-black/50 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-black/70"
                                            >×</button>
                                            <div className="absolute inset-0 bg-black/0 hover:bg-black/20 transition-all flex items-center justify-center opacity-0 hover:opacity-100">
                                                <span className="text-white text-sm font-semibold bg-black/50 px-3 py-1 rounded-lg">이미지 변경</span>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center h-28 gap-2 text-amber-400 select-none">
                                            <svg className="w-8 h-8 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                            </svg>
                                            <p className="text-sm text-amber-700 font-medium">클릭 또는 드래그해서 이미지 추가</p>
                                            <p className="text-xs text-amber-400">이미지 복사 후 Ctrl+V 붙여넣기도 가능</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                            {/* 웹 주소 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">웹 주소 (URL)</label>
                                <div className="flex gap-2">
                                    <input className="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none"
                                        placeholder="https://..." value={form.url}
                                        onChange={e => setForm({...form, url: e.target.value})} />
                                    {form.url && (
                                        <a href={form.url} target="_blank" rel="noopener noreferrer"
                                            className="px-4 py-2.5 border border-amber-200 text-amber-700 rounded-xl text-sm font-semibold hover:bg-amber-50 transition-all flex items-center gap-1 whitespace-nowrap">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                            </svg>
                                            이동
                                        </a>
                                    )}
                                </div>
                            </div>
                            {/* 첨부파일 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">첨부파일</label>
                                <div
                                    onDragOver={e => e.preventDefault()}
                                    onDrop={e => { e.preventDefault(); Array.from(e.dataTransfer.files).forEach(addAttachment); }}
                                    onClick={() => document.getElementById('attachFileInput').click()}
                                    className="border-2 border-dashed border-gray-200 rounded-xl p-4 cursor-pointer hover:border-amber-300 transition-all">
                                    <input id="attachFileInput" type="file" multiple className="hidden"
                                        onChange={e => Array.from(e.target.files).forEach(addAttachment)} />
                                    <div className="flex items-center gap-2 text-gray-400 text-sm">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                                        </svg>
                                        클릭 또는 드래그해서 파일 첨부 (여러 개 가능)
                                    </div>
                                </div>
                                {attachments.length > 0 && (
                                    <div className="mt-2 space-y-1">
                                        {attachments.map((f, i) => (
                                            <div key={i} className="flex items-center justify-between px-3 py-2 bg-gray-50 rounded-lg text-sm">
                                                <span className="text-gray-700 truncate flex-1">📎 {f.name}</span>
                                                <span className="text-gray-400 text-xs ml-2">{(f.size/1024).toFixed(0)}KB</span>
                                                <button onClick={() => setAttachments(prev => prev.filter((_, j) => j !== i))}
                                                    className="ml-2 text-gray-400 hover:text-red-500 text-xs">×</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            {/* 태그 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">태그</label>
                                <div className="flex gap-2 mb-2">
                                    <input className="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none"
                                        placeholder="태그 입력 후 Enter 또는 + 클릭" value={tagInput}
                                        onChange={e => setTagInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addTag(tagInput))} />
                                    <button onClick={() => addTag(tagInput)}
                                        className="px-4 py-2.5 gradient-bg text-white rounded-xl font-semibold text-sm hover:shadow-md transition-all">
                                        +
                                    </button>
                                </div>
                                {/* 기존 태그 추천 */}
                                {allTags.length > 0 && (
                                    <div className="flex flex-wrap gap-1 mb-2">
                                        {allTags.filter(t => !tags.includes(t)).slice(0, 12).map(t => (
                                            <button key={t} onClick={() => setTags(prev => [...prev, t])}
                                                className="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded-md hover:bg-amber-100 hover:text-amber-800 transition-all">
                                                +{t}
                                            </button>
                                        ))}
                                    </div>
                                )}
                                <div className="flex flex-wrap gap-1.5">
                                    {tags.map(t => (
                                        <span key={t} className="tag-chip tag-chip-active">
                                            #{t}
                                            <span className="tag-del-btn" onClick={() => removeTag(t)}>×</span>
                                        </span>
                                    ))}
                                </div>
                            </div>
                        </div>
                        {/* 버튼 */}
                        <div className="px-6 py-4 border-t border-gray-100 flex gap-3 justify-end">
                            <button onClick={onClose} className="px-6 py-2.5 border border-gray-200 rounded-xl text-gray-600 font-semibold hover:bg-gray-50 transition-all">취소</button>
                            <button onClick={handleSubmit} className="px-6 py-2.5 gradient-bg text-white rounded-xl font-semibold hover:shadow-lg transition-all">카드 등록</button>
                        </div>
                    </div>
                </div>
            );
        }

        /* ───── EditNewsModal ───── */
        function EditNewsModal({ news, onClose, onSave, allTags }) {
            const [form, setForm] = useState({
                title: news.title,
                summary: news.summary,
                fullContent: news.fullContent || '',
                company: news.company,
                ticker: news.ticker,
                url: news.url || '',
                image: news.image || ''
            });
            const [tagInput, setTagInput] = useState('');
            const [tags, setTags] = useState([...news.tags]);
            const [attachments, setAttachments] = useState(news.attachments || []);

            const addTag = (t) => {
                const v = t.trim().replace(/^#/, '');
                if (v && !tags.includes(v)) setTags(prev => [...prev, v]);
                setTagInput('');
            };
            const removeTag = (t) => setTags(prev => prev.filter(x => x !== t));

            const addAttachment = (file) => {
                const reader = new FileReader();
                reader.onload = ev => setAttachments(prev => [...prev, { name: file.name, data: ev.target.result, type: file.type, size: file.size }]);
                reader.readAsDataURL(file);
            };

            const handleSave = () => {
                if (!form.title) return alert('제목은 필수입니다.');
                onSave({ ...news, ...form, tags, attachments });
                onClose();
            };

            const fileInputId = 'editImgFileInput_' + news.id;

            return (
                <div className="modal-overlay" style={{zIndex:70}} onClick={e => e.target === e.currentTarget && onClose()}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl my-8 overflow-hidden">
                        <div className="gradient-bg px-6 py-5 flex items-center justify-between">
                            <h2 className="text-white font-bold text-xl">✏️ 뉴스 수정</h2>
                            <button onClick={onClose} className="text-white/80 hover:text-white">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto max-h-[75vh] space-y-4">
                            {/* 제목 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">제목 <span className="text-red-400">*</span></label>
                                <input className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none"
                                    value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                            </div>

                            {/* 요약 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">키워드</label>
                                <textarea className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none resize-none"
                                    rows={2} value={form.summary} onChange={e => setForm({...form, summary: e.target.value})} />
                            </div>
                            {/* 본문 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">본문</label>
                                <textarea className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm gold-ring outline-none resize-none"
                                    rows={6} value={form.fullContent} onChange={e => setForm({...form, fullContent: e.target.value})} />
                            </div>
                            {/* 이미지 */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">이미지</label>
                                <div
                                    onDragOver={e => { e.preventDefault(); }}
                                    onDrop={e => {
                                        e.preventDefault();
                                        const file = e.dataTransfer.files[0];
                                        if (file && file.type.startsWith('image/')) {
                                            const reader = new FileReader();
                                            reader.onload = ev => setForm(f => ({...f, image: ev.target.result}));
                                            reader.readAsDataURL(file);
                                        }
                                    }}
                                    onPaste={e => {
                                        const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
                                        if (item) {
                                            e.preventDefault();
                                            const reader = new FileReader();
                                            reader.onload = ev => setForm(f => ({...f, image: ev.target.result}));
                                            reader.readAsDataURL(item.getAsFile());
                                        }
                                    }}
                                    onClick={() => document.getElementById(fileInputId).click()}
                                    className="relative border-2 border-dashed border-amber-200 rounded-xl overflow-hidden cursor-pointer hover:border-amber-400 transition-all"
                                    style={{minHeight:'120px'}}
                                >
                                    <input id={fileInputId} type="file" accept="image/*" className="hidden"
                                        onChange={e => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const reader = new FileReader();
                                                reader.onload = ev => setForm(f => ({...f, image: ev.target.result}));
                                                reader.readAsDataURL(file);
                                            }
                                        }} />
                                    {form.image ? (
                                        <div className="relative">
                                            <img src={form.image} alt="preview" className="w-full h-32 object-cover" />
                                            <button onClick={e => { e.stopPropagation(); setForm(f => ({...f, image: ''})); }}
                                                className="absolute top-2 right-2 bg-black/50 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-black/70">×</button>
                                            <div className="absolute inset-0 bg-black/0 hover:bg-black/20 transition-all flex items-center justify-center opacity-0 hover:opacity-100">

        /* ───── GitHub Gist 설정 ───── */
        const GH_CONFIG_KEY = 'insight_ghConfig';

        function loadGhConfig() {
            try { return JSON.parse(localStorage.getItem(GH_CONFIG_KEY)) || {}; } catch(e) { return {}; }
        }
        function saveGhConfig(cfg) {
            localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg));
        }

        async function gistLoad(token, gistId) {
            const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            if (!res.ok) throw new Error('Gist 불러오기 실패: ' + res.status);
            const data = await res.json();
            const file = data.files['insight.json'];
            if (!file) throw new Error('insight.json 파일이 Gist에 없습니다.');
            return JSON.parse(file.content);
        }

        async function gistSave(token, gistId, newsList) {
            // base64 이미지는 Gist 용량 초과 원인 → URL이 아닌 경우(data:로 시작) 제거
            const stripped = newsList.map(n => ({
                ...n,
                image: (n.image && !n.image.startsWith('data:')) ? n.image : '',
                attachments: (n.attachments || []).map(a => ({...a, data: ''}))
            }));
            const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { 'insight.json': { content: JSON.stringify(stripped, null, 2) } } })
            });
            if (!res.ok) throw new Error('Gist 저장 실패: ' + res.status);
        }

        const STORAGE_KEY = 'insight_newsList';

        function App() {
            const [searchTerm, setSearchTerm] = useState("");

                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    return saved ? JSON.parse(saved) : sampleNews;
                } catch(e) { return sampleNews; }
            });
            const [selectedNews, setSelectedNews] = useState(null);
            const [selectedTags, setSelectedTags] = useState([]);
            const [showAddNews, setShowAddNews] = useState(false);
            const [showTagManager, setShowTagManager] = useState(false);
            const [tagInputDetail, setTagInputDetail] = useState('');
            const [showTagEdit, setShowTagEdit] = useState(false);
            const [showEditNews, setShowEditNews] = useState(false);
            const [showRandomNews, setShowRandomNews] = useState(false);
            const [randomIndex, setRandomIndex] = useState(0);
            const [showGhSettings, setShowGhSettings] = useState(false);
            const [appTitle, setAppTitle] = useState(() => localStorage.getItem('insight_appTitle') || 'INSIGHT + IDEA + BEST ITEM');
            const [editingTitle, setEditingTitle] = useState(false);
            const [titleInput, setTitleInput] = useState('');
            const [ghConfig, setGhConfig] = useState(() => loadGhConfig());
            const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | ok | error

            // 앱 시작 시 Gist에서 로드
            useEffect(() => {
                const cfg = loadGhConfig();
                if (!cfg.token || !cfg.gistId) return;
                setSyncStatus('syncing');
                gistLoad(cfg.token, cfg.gistId)
                    .then(data => {
                        if (Array.isArray(data)) {
                            setNewsListRaw(data);
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                        }
                        setSyncStatus('ok');
                    })
                    .catch(e => {
                        setSyncStatus('error');
                        console.error('Gist 로드 실패:', e.message);
                    });
            }, []);

            // newsList 변경 시 localStorage + Gist 저장
            const setNewsList = (updater) => {
                setNewsListRaw(prev => {
                    const next = typeof updater === 'function' ? updater(prev) : updater;
                    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch(e) {}
                    const cfg = loadGhConfig();
                    if (cfg.token && cfg.gistId) {
                        setSyncStatus('syncing');
                        gistSave(cfg.token, cfg.gistId, next)
                            .then(() => setSyncStatus('ok'))
                            .catch(e => {
                                setSyncStatus('error');
                                alert('⚠️ Gist 저장 실패: ' + e.message + '\n헤더의 [저장] 버튼으로 다시 시도해주세요.');
                            });
                    }
                    return next;
                });
            };

            const allTags = [...new Set(newsList.flatMap(n => n.tags))].sort();

            const toggleTag = (tag) => setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);

                    {/* 푸터 */}
                    <footer className="border-t border-amber-100 mt-12 bg-white">
                        <div className="max-w-7xl mx-auto px-6 py-6 text-center text-amber-700/60 text-sm">
                            © 2025 INSIGHT + IDEA + BEST ITEM
                        </div>
                    </footer>

                    {/* 모달들 */}
                    {showAddNews && <AddNewsModal onClose={() => setShowAddNews(false)} onAdd={addNews} allTags={allTags} />}
                    {showTagManager && <TagManagerModal allTags={allTags} newsList={newsList} setNewsList={setNewsList} onClose={() => setShowTagManager(false)} />}
                    {showEditNews && selectedNews && <EditNewsModal news={selectedNews} onClose={() => setShowEditNews(false)} onSave={saveNews} allTags={allTags} />}
                    {showGhSettings && <GitHubSettingsModal onClose={() => setShowGhSettings(false)} onSaved={(cfg) => setGhConfig(cfg)} />}
                    {showRandomNews && newsList.length > 0 && <RandomNewsModal newsList={newsList} initialIndex={randomIndex} onClose={() => setShowRandomNews(false)} />}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
